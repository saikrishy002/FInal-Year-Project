{% extends "base.html" %}
{% block content %}

<section role="region" aria-labelledby="additem-heading" class="row justify-content-center mt-4">
    <div class="col-md-6">
        <article class="card shadow">
            <header class="card-header bg-primary text-white">
                <h2 id="additem-heading"><i class="fas fa-box-open"></i> Add Item</h2>
            </header>
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
                    <div class="input-group mb-2">
                        <span class="input-group-text"><i class="fas fa-tag"></i></span>
                        <input class="form-control" name="name" placeholder="Item Name" required>
                    </div>
                    <div class="input-group mb-2">
                        <span class="input-group-text"><i class="fas fa-list"></i></span>
                        <select class="form-select" name="category" aria-label="Category">
                            <option value="" selected disabled>Choose category</option>
                            {% for cat in categories %}
                            <option value="{{ cat }}">{{ cat }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-2">
                        <label>Purchase Date</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-calendar-alt"></i></span>
                            <input type="date" class="form-control" name="purchase_date" required>
                        </div>
                    </div>
                    <div class="mb-2">
                        <label>Expiry Date</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-calendar-check"></i></span>
                            <input type="date" class="form-control" name="expiry_date" required>
                        </div>
                    </div>
                    <div class="input-group mb-2">
                        <span class="input-group-text"><i class="fas fa-hashtag"></i></span>
                        <input type="number" class="form-control" name="quantity" placeholder="Quantity" required>
                    </div>

                    <button class="btn btn-success w-100">
                        <i class="fas fa-plus-circle"></i> Add Item
                    </button>
                </form>
            </div>
        </article>
    </div>
</section>

{% endblock %}
