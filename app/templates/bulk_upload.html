{% extends "base.html" %}
{% block content %}

<section role="region" aria-labelledby="bulk-heading" class="row justify-content-center mt-4">
    <div class="col-md-6">
        <article class="card shadow">
            <header class="card-header bg-info text-white">
                <h2 id="bulk-heading"><i class="fas fa-file-upload"></i> Bulk Upload Items</h2>
            </header>
            <div class="card-body">
                <form method="POST" enctype="multipart/form-data">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
                    <div class="mb-3">
                        <input type="file" name="file" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-upload"></i> Upload
                    </button>
                </form>
                <p class="mt-3">File must contain columns:</p>
                <code>name, category, purchase_date, expiry_date, quantity</code>
            </div>
        </article>
    </div>
</section>

{% endblock %}
