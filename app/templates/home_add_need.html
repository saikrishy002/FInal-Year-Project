{% extends "base.html" %}
{% block content %}

<section role="region" aria-labelledby="addneed-heading" class="row justify-content-center mt-4">
    <div class="col-md-6">
        <article class="card shadow border-0 rounded-4">
            <header class="card-header bg-primary text-white py-3 border-0 rounded-top-4">
                <h3 id="addneed-heading" class="mb-0"><i class="fas fa-plus-circle me-2"></i> Add Household Need</h3>
            </header>
            <div class="card-body p-4">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

                    <div class="mb-3">
                        <label class="form-label fw-bold">Product Name</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-tag"></i></span>
                            <input class="form-control" name="name" placeholder="e.g. Fresh Milk, Bread" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Category</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-list"></i></span>
                            <select class="form-select" name="category" required>
                                <option value="" selected disabled>Choose category</option>
                                {% for cat in categories %}
                                <option value="{{ cat }}">{{ cat }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Priority Level</label>
                        <div class="d-flex gap-3 mt-1">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="priority" id="pLow" value="low">
                                <label class="form-check-label text-muted" for="pLow">Low</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="priority" id="pMed" value="medium"
                                    checked>
                                <label class="form-check-label" for="pMed">Medium</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="priority" id="pHigh" value="high">
                                <label class="form-check-label text-danger fw-bold" for="pHigh">High</label>
                            </div>
                        </div>
                    </div>

                    <button class="btn btn-primary w-100 py-2 rounded-pill fw-bold">
                        <i class="fas fa-save me-1"></i> Save to Needs List
                    </button>

                    <div class="text-center mt-3">
                        <a href="{{ url_for('home.needs') }}" class="text-decoration-none small text-muted">
                            <i class="fas fa-arrow-left me-1"></i> Back to Needs List
                        </a>
                    </div>
                </form>
            </div>
        </article>
    </div>
</section>

{% endblock %}
