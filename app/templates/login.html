{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 75vh;">
    <div class="col-md-10 col-lg-8">
        <div class="card border-0 shadow-lg overflow-hidden">
            <div class="row g-0">
                <!-- Illustration Side -->
                <div
                    class="col-md-6 bg-primary d-none d-md-flex align-items-center justify-content-center p-5 text-white">
                    <div class="text-center">
                        <i class="fas fa-calendar-check fa-5x mb-4"></i>
                        <h2 class="fw-bold">Welcome Back</h2>
                        <p class="opacity-75">Sign in to continue managing your inventory and reducing waste with
                            ExpiryGuard.</p>
                        <div class="mt-4">
                            <span class="badge bg-white text-primary rounded-pill px-3 py-2">Smart Prediction</span>
                            <span class="badge bg-white text-primary rounded-pill px-3 py-2 ms-2">Real-time
                                Alerts</span>
                        </div>
                    </div>
                </div>
                <!-- Form Side -->
                <div class="col-md-6 p-4 p-lg-5 bg-white">
                    <div class="text-center mb-4 d-md-none">
                        <i class="fas fa-calendar-check text-primary fa-3x mb-2"></i>
                        <h3 class="fw-bold">Sign In</h3>
                    </div>
                    <h3 class="fw-bold mb-4 d-none d-md-block">Sign In</h3>

                    <form method="POST">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-secondary">EMAIL ADDRESS</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0"><i
                                        class="fas fa-envelope text-muted"></i></span>
                                <input type="email" name="email" class="form-control bg-light border-0"
                                    placeholder="name@company.com" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <div class="d-flex justify-content-between">
                                <label class="form-label small fw-bold text-secondary">PASSWORD</label>
                                <a href="#" class="small text-decoration-none">Forgot?</a>
                            </div>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0"><i
                                        class="fas fa-lock text-muted"></i></span>
                                <input type="password" name="password" class="form-control bg-light border-0"
                                    placeholder="••••••••" required>
                            </div>
                        </div>

                        <button class="btn btn-primary w-100 py-3 fw-bold mb-4 shadow-sm">
                            LOGIN TO DASHBOARD
                        </button>

                        <div class="text-center">
                            <p class="text-secondary small mb-0">Don't have an account?
                                <a href="{{ url_for('user.register') }}"
                                    class="fw-bold text-primary text-decoration-none">Create one</a>
                            </p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .form-control:focus {
        background-color: #fff !important;
        box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1) !important;
        border: 1px solid var(--primary) !important;
    }

    .input-group-text {
        border-right: none !important;
    }

    .form-control {
        border-left: none !important;
    }
</style>
{% endblock %}
